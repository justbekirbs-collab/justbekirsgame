<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JustBekir's Game 43 - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
        }

        /* Moving Nebula Background */
        .nebula-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(88, 28, 135, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, transparent 100%);
            animation: nebulaRotate 120s linear infinite;
            z-index: -2;
            pointer-events: none;
        }

        /* RGB Border Animation */
        .rgb-border-anim {
            border: 2px solid transparent !important;
            background-clip: padding-box, border-box !important;
            background-origin: padding-box, border-box !important;
            background-image: linear-gradient(to right, #0f172a, #0f172a), 
                              linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000) !important;
            background-size: 100% 100%, 200% 100% !important;
            animation: rgbFlow 4s linear infinite !important;
        }

        @keyframes rgbFlow {
            0% { background-position: 0% 0%, 0% 0%; }
            100% { background-position: 0% 0%, 200% 0%; }
        }

        /* Fixed Global RGB Text Effect */
        /* We use a specific class and target headers/paragraphs to avoid breaking containers */
        .rgb-text, h1, h2, h3, h4, h5, h6, p, label, li, b, strong {
            background: linear-gradient(90deg, #ff3333, #33ff33, #3333ff, #ff3333) !important;
            background-size: 300% 100% !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            animation: rgbTextMove 5s linear infinite !important;
            display: inline-block;
        }

        /* Ensure standard spans and buttons are visible by default unless they have .rgb-text */
        span, button {
            color: inherit;
        }

        input::placeholder {
            color: #475569 !important;
            -webkit-text-fill-color: #475569 !important;
        }

        @keyframes rgbTextMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        /* Decorative Elements */
        .data-streaks {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.15;
        }
        .streak {
            position: absolute;
            width: 1px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, #3b82f6, transparent);
            animation: streakMove 5s linear infinite;
        }

        @keyframes streakMove {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 100;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 120%; }
            100% { bottom: -20%; }
        }

        @keyframes nebulaRotate {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            to { transform: rotate(360deg) scale(1); }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.4); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-down { animation: slideDown 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop-in { animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .hover-3d { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .hover-3d:hover { transform: translateY(-15px) rotateX(10deg) rotateY(5deg) scale(1.05); }
        .active-crunch:active { transform: scale(0.85); transition: transform 0.1s; }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .btn-gliss { position: relative; z-index: 1; overflow: hidden; }
        .btn-gliss::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: -1;
        }
        .btn-gliss:hover::before { left: 100%; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
<body>
    <div class="nebula-bg"></div>
    <div class="grid-overlay"></div>
    <div class="data-streaks" id="streaks-container"></div>
    <div class="scanline"></div>
    <div id="root"></div>

    <script>
        const container = document.getElementById('streaks-container');
        for (let i = 0; i < 40; i++) {
            const streak = document.createElement('div');
            streak.className = 'streak';
            streak.style.left = Math.random() * 100 + 'vw';
            streak.style.animationDelay = Math.random() * 5 + 's';
            streak.style.animationDuration = (2 + Math.random() * 5) + 's';
            streak.appendChild(document.createTextNode(''));
            container.appendChild(streak);
        }
    </script>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
